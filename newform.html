<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>New Form - Anna Homkes</title>

<style>
body {
  font-family: Arial, sans-serif;
}

form {
  background-color: #EAEAEA;
  width: 400px;
  padding: 20px;
  margin: auto;
}

label {
  display: block;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>Chapter 9 Assignment</h1>

<form method="post" action="https://webdevbasics.net/scripts/demo.php">

  <!-- a. Username (max 30 characters) -->
  <label for="username">Username:</label>
  <input type="text" name="username" id="username" maxlength="30">

  <!-- b. Radio buttons -->
  <p>Favorite Day of the Week:</p>

  <input type="radio" name="favday" value="Monday"> Monday<br>
  <input type="radio" name="favday" value="Tuesday"> Tuesday<br>
  <input type="radio" name="favday" value="Wednesday"> Wednesday<br>
  <input type="radio" name="favday" value="Thursday"> Thursday<br>
  <input type="radio" name="favday" value="Friday"> Friday<br>
  <input type="radio" name="favday" value="Saturday"> Saturday<br>
  <input type="radio" name="favday" value="Sunday"> Sunday<br>

  <!-- c. Select list -->
  <label for="social">Favorite Social Networking Site:</label>
  <select name="social" id="social">
    <option value="Instagram">Instagram</option>
    <option value="TikTok">TikTok</option>
    <option value="Snapchat">Snapchat</option>
    <option value="Facebook">Facebook</option>
  </select>

  <!-- d. Fieldset -->
  <fieldset>
    <legend>Shipping Address</legend>

    <label for="address1">Addressline1:</label>
    <input type="text" name="address1" id="address1">

    <label for="address2">Addressline2:</label>
    <input type="text" name="address2" id="address2">

    <label for="city">City:</label>
    <input type="text" name="city" id="city">

    <label for="state">State:</label>
    <input type="text" name="state" id="state">

    <label for="zip">Zip:</label>
    <input type="text" name="zip" id="zip">
  </fieldset>

  <!-- f. Hidden input -->
  <input type="hidden" name="userid" value="AH123">

  <!-- g. Password -->
  <label for="pword">Password:</label>
  <input type="password" name="pword" id="pword">

  <br><br>

  <!-- e. Image button -->
  <input type="image" src="signup.gif" alt="Sign Up">

</form>

<p style="text-align:center;">
<a href="https://annahomkes.github.io/">Back to Home</a>
</p>

</body>
</html>
